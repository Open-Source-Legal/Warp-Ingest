name: Publish Python Package

# Build the sdist/wheel and publish to PyPI on every published GitHub release,
# using PyPI Trusted Publishing (OIDC) -- no API token/secret stored in this
# repo. The `pypi` environment gate + `id-token: write` are what let PyPI
# verify this workflow run's identity; PyPI-side setup (one-time) is a
# trusted publisher registered at https://pypi.org/manage/account/publishing/
# for owner=Open-Source-Legal, repo=Warp-Ingest, workflow=python-publish.yml,
# environment=pypi.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs derives the package version from `git describe`; a
          # shallow, tagless checkout would build a 0.x dev version.
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Build package
        run: uv build
      - name: Check distribution metadata
        run: uvx twine check dist/*
      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/warp-ingest/
    permissions:
      id-token: write # mandatory for trusted publishing
    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        # Pinned to the release tag rather than its commit SHA: this action is a
        # Docker-image action, and GitHub's immutable-actions resolution pulls
        # ghcr.io/pypa/gh-action-pypi-publish:<ref> literally -- pypa only publishes
        # that OCI image under the version tag, not under the raw commit SHA, so a
        # SHA pin here 404s ("manifest unknown") even though the SHA is correct.
        uses: pypa/gh-action-pypi-publish@v1.14.0
